version: '3.8'

# OrderEase 生产环境部署配置
# 用途：基于已构建的镜像进行部署
# 使用方法：
#   cd d:\local_code_repo\OrderEase\OrderEase-Deploy\deploy
#   docker-compose up -d

services:
  # 应用服务
  orderease-app:
    image: siyuanh640/orderease:latest
    pull_policy: always  # 强制每次拉取最新镜像，避免使用本地缓存的旧镜像
    container_name: orderease-app
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # 数据库配置
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-orderease}

      # JWT配置
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-7200}

      # 时区配置
      - TZ=${TZ:-Asia/Shanghai}

      # 微信小程序配置
      - WECHAT_MINIPROGRAM_ENABLED=${WECHAT_MINIPROGRAM_ENABLED:-false}
      - WECHAT_MINIPROGRAM_APP_ID=${WECHAT_MINIPROGRAM_APP_ID:-}
      - WECHAT_MINIPROGRAM_APP_SECRET=${WECHAT_MINIPROGRAM_APP_SECRET:-}
    volumes:
      # 持久化上传文件
      - ./data/uploads:/app/uploads
      # 持久化日志
      - ./data/logs:/app/logs
      # 配置文件（可选，如需动态修改）
      - ./config/config.yaml:/app/config/config.yaml:ro
    networks:
      - orderease-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/order-ease-iui/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: orderease-mysql
    env_file:
      - .env
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME:-orderease}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./data/mysql:/var/lib/mysql
      # 初始化SQL脚本（可选）
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - orderease-network
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  orderease-network:
    driver: bridge
