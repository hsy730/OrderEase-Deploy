name: OrderEase Build, Test and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "跳过测试（不推荐）"
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [triggered-by-code-change]

permissions:
  contents: read
  security-events: write
  actions: read

env:
  DOCKER_IMAGE: docker.io/siyuanh640/orderease
  PYTHON_VERSION: "3.11"
  MYSQL_VERSION: "8.0"

jobs:
  # ============================================
  # Job 1: 检出所有仓库代码
  # ============================================
  checkout-repos:
    name: Checkout All Repositories
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Deploy Repository
        uses: actions/checkout@v4
        with:
          path: OrderEase-Deploy

      - name: Checkout FrontUI Repository
        uses: actions/checkout@v4
        with:
          repository: hsy730/OrderEase-FrontUI
          ref: main
          path: OrderEase-FrontUI

      - name: Checkout BackedUI Repository
        uses: actions/checkout@v4
        with:
          repository: hsy730/OrderEase-BackedUI
          ref: main
          path: OrderEase-BackedUI

      - name: Checkout Golang Repository
        uses: actions/checkout@v4
        with:
          repository: hsy730/OrderEase-Golang
          ref: main
          path: OrderEase-Golang

      - name: Prepare Build Context
        run: |
          # 创建构建目录结构
          mkdir -p build-context
          cp -r OrderEase-FrontUI build-context/
          cp -r OrderEase-BackedUI build-context/
          cp -r OrderEase-Golang build-context/

      - name: Debug - Verify FrontUI Files
        run: |
          echo "=== OrderEase-FrontUI/scripts directory ==="
          ls -la OrderEase-FrontUI/scripts/ || echo "scripts directory not found in checkout"
          echo ""
          echo "=== build-context/OrderEase-FrontUI/scripts directory ==="
          ls -la build-context/OrderEase-FrontUI/scripts/ || echo "scripts directory not found in build-context"

      - name: Upload Build Context
        uses: actions/upload-artifact@v4
        with:
          name: build-context
          path: build-context/
          retention-days: 1

  # ============================================
  # Job 1.5: Go 单元测试
  # ============================================
  go-test:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    needs: checkout-repos
    steps:
      - name: Checkout Golang Repository
        uses: actions/checkout@v4
        with:
          repository: hsy730/OrderEase-Golang
          ref: main
          path: OrderEase-Golang

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: OrderEase-Golang/src/go.sum

      - name: Download Dependencies
        working-directory: OrderEase-Golang/src
        run: go mod download

      - name: Run Go Tests
        id: go-test
        working-directory: OrderEase-Golang/src
        run: |
          echo "Running Go unit tests..."
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate Coverage Report
        working-directory: OrderEase-Golang/src
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-report
          path: OrderEase-Golang/src/coverage.html
          retention-days: 7

      - name: Print Coverage Summary
        working-directory: OrderEase-Golang/src
        run: |
          echo "=== Coverage Summary ==="
          go tool cover -func=coverage.out | tail -n 1

  # ============================================
  # Job 1.6: 前端单元测试 (BackedUI & FrontUI)
  # ============================================
  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    needs: checkout-repos
    steps:
      - name: Checkout BackedUI Repository
        uses: actions/checkout@v4
        with:
          repository: hsy730/OrderEase-BackedUI
          ref: main
          path: OrderEase-BackedUI

      - name: Checkout FrontUI Repository
        uses: actions/checkout@v4
        with:
          repository: hsy730/OrderEase-FrontUI
          ref: main
          path: OrderEase-FrontUI

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            OrderEase-BackedUI/package-lock.json
            OrderEase-FrontUI/package-lock.json

      - name: Install BackedUI Dependencies
        working-directory: OrderEase-BackedUI
        run: npm ci

      - name: Run BackedUI Tests
        id: backedui-test
        working-directory: OrderEase-BackedUI
        run: |
          echo "Running BackedUI unit tests..."
          npm run test:run -- --reporter=json --outputFile=test-results.json

      - name: Upload BackedUI Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backedui-test-results
          path: OrderEase-BackedUI/test-results.json
          retention-days: 7

      - name: Install FrontUI Dependencies
        working-directory: OrderEase-FrontUI
        run: npm ci

      - name: Run FrontUI Tests
        id: frontui-test
        working-directory: OrderEase-FrontUI
        run: |
          echo "Running FrontUI unit tests..."
          npm run test -- --reporter=json --outputFile=test-results.json

      - name: Generate FrontUI Coverage Report
        if: always()
        working-directory: OrderEase-FrontUI
        run: npm run test:coverage || true

      - name: Upload FrontUI Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontui-test-results
          path: |
            OrderEase-FrontUI/test-results.json
            OrderEase-FrontUI/coverage/
          retention-days: 7

      - name: Print Test Summary
        if: always()
        run: |
          echo "=== BackedUI Test Results ==="
          if [ -f OrderEase-BackedUI/test-results.json ]; then
            cat OrderEase-BackedUI/test-results.json | jq '.numPassedTests, .numFailedTests, .numTotalTests' 2>/dev/null || echo "Test results file found but could not parse"
          else
            echo "No test results file found"
          fi
          
          echo ""
          echo "=== FrontUI Test Results ==="
          if [ -f OrderEase-FrontUI/test-results.json ]; then
            cat OrderEase-FrontUI/test-results.json | jq '.numPassedTests, .numFailedTests, .numTotalTests' 2>/dev/null || echo "Test results file found but could not parse"
          else
            echo "No test results file found"
          fi

  # ============================================
  # Job 2: 构建多阶段 Docker 镜像
  # ============================================
  build-image:
    name: Build All-in-One Docker Image
    runs-on: ubuntu-latest
    needs: [checkout-repos, go-test, frontend-test]
    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}
      image-digest: ${{ steps.build.outputs.digest }}
    env:
      FIRST_TAG: ""
    steps:
      - name: Checkout Deploy Repository
        uses: actions/checkout@v4
        with:
          path: OrderEase-Deploy

      - name: Download Build Context
        uses: actions/download-artifact@v4
        with:
          name: build-context
          path: .

      - name: Debug - List Build Context Files
        run: |
          echo "=== Build Context Structure ==="
          ls -la
          echo ""
          echo "=== Current Directory Contents (recursive) ==="
          find . -maxdepth 3 -type d | head -50
          echo ""
          echo "=== OrderEase-FrontUI Structure ==="
          ls -la OrderEase-FrontUI/ || echo "OrderEase-FrontUI not found"
          echo ""
          echo "=== OrderEase-FrontUI/scripts Structure ==="
          ls -la OrderEase-FrontUI/scripts/ || echo "scripts directory not found"
          echo ""
          echo "=== OrderEase-FrontUI/scripts/postinstall.js content ==="
          cat OrderEase-FrontUI/scripts/postinstall.js | head -20 || echo "postinstall.js not found"
          echo ""
          echo "=== OrderEase-FrontUI/package.json ==="
          cat OrderEase-FrontUI/package.json || echo "package.json not found"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Debug - Print Docker Username
        run: |
          USER="${{ secrets.DOCKER_USERNAME }}"
          echo "Username is: ${USER:0:3}***"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Image Tag
        id: set-tag
        run: |
          DOCKER_IMAGE="${{ env.DOCKER_IMAGE }}"
          # Set a consistent tag based on event type
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="${DOCKER_IMAGE}:pr-${{ github.event.pull_request.number }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAG="${DOCKER_IMAGE}:latest"
          else
            BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
            TAG="${DOCKER_IMAGE}:${BRANCH_NAME}"
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Build Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./OrderEase-Deploy/build/Dockerfile
          push: false
          load: true
          tags: ${{ steps.set-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VERSION=${{ github.sha }}

      - name: Export Image to TAR
        run: |
          TAG="${{ steps.set-tag.outputs.tag }}"
          echo "Exporting image: $TAG"
          docker image save "$TAG" -o orderease-image.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orderease-docker-image
          path: orderease-image.tar
          retention-days: 1

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.set-tag.outputs.tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

      - name: Print Trivy Summary
        run: |
          echo "=== Trivy Vulnerability Scan Summary ==="
          cat trivy-results.sarif | jq -r '.runs[0].results | length' | xargs -I {} echo "Found {} vulnerabilities"

  # ============================================
  # Job 3: 启动服务容器并执行测试
  # ============================================
  integration-test:
    name: Integration Tests with Pytest
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event.inputs.skip_tests != 'true'
    env:
      MYSQL_ROOT_PASSWORD: RootPassword123!
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: RootPassword123!
          MYSQL_DATABASE: mysql
          TZ: Asia/Shanghai
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -pRootPassword123!"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=30s
    steps:
      - name: Checkout Deploy Repository
        uses: actions/checkout@v4
        with:
          path: OrderEase-Deploy

      - name: Download Docker Image
        uses: actions/download-artifact@v4
        with:
          name: orderease-docker-image
          path: .

      - name: Load Docker Image
        run: |
          docker image load -i orderease-image.tar

      - name: Debug - Show Docker Networks and Containers
        run: |
          echo "=== Docker Networks ==="
          docker network ls
          echo ""
          echo "=== Running Containers ==="
          docker ps
          echo ""
          echo "=== MySQL Container Network Info ==="
          MYSQL_CONTAINER_ID=$(docker ps -q -f ancestor=mysql:8.0)
          if [ -n "$MYSQL_CONTAINER_ID" ]; then
            docker inspect $MYSQL_CONTAINER_ID | jq '.[0].NetworkSettings.Networks'
          fi

      - name: Start OrderEase Application Container
        run: |
          IMAGE_TAG="${{ needs.build-image.outputs.image-tag }}"

          # Fallback: if IMAGE_TAG is empty, get it from docker images
          if [ -z "$IMAGE_TAG" ]; then
            echo "Warning: IMAGE_TAG from job output is empty, getting tag from docker images..."
            IMAGE_TAG=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "siyuanh640/orderease" | head -n1)
            echo "Using tag: $IMAGE_TAG"
          fi

          if [ -z "$IMAGE_TAG" ]; then
            echo "Error: IMAGE_TAG is still empty after fallback!"
            docker images
            exit 1
          fi

          # Get the network that MySQL is connected to
          MYSQL_CONTAINER_ID=$(docker ps -q -f ancestor=mysql:8.0)
          MYSQL_NETWORK=$(docker inspect $MYSQL_CONTAINER_ID | jq -r '.[0].NetworkSettings.Networks | keys[0]')
          echo "MySQL is on network: $MYSQL_NETWORK"

          docker run -d \
            --name orderease-app \
            --network "$MYSQL_NETWORK" \
            -p 8080:8080 \
            -e DB_HOST=mysql \
            -e DB_PORT=3306 \
            -e DB_USERNAME=root \
            -e DB_PASSWORD=${{ env.MYSQL_ROOT_PASSWORD }} \
            -e DB_NAME=mysql \
            -e JWT_SECRET=${{ env.JWT_SECRET }} \
            -e TZ=Asia/Shanghai \
            -e GIN_MODE=release \
            "$IMAGE_TAG"

      - name: Check Container Status
        run: |
          echo "=== Docker Container Status ==="
          docker ps -a
          echo ""
          echo "=== OrderEase App Container Logs ==="
          docker logs orderease-app 2>&1 || echo "No logs available yet"

      - name: Wait for Application to be Ready
        run: |
          echo "Waiting for OrderEase to start..."
          
          # Wait up to 120 seconds for the app to be ready
          MAX_ATTEMPTS=60
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS..."
            
            # Check if container is still running
            if ! docker ps | grep -q orderease-app; then
              echo "ERROR: Container orderease-app is not running!"
              echo "=== Container Logs ==="
              docker logs orderease-app 2>&1
              exit 1
            fi
            
            # Try to connect
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/order-ease-iui/ 2>/dev/null || echo "000")
            echo "HTTP Response Code: $HTTP_CODE"
            
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "OrderEase is ready!"
              exit 0
            fi
            
            # Show logs every 10 attempts
            if [ $((ATTEMPT % 10)) -eq 0 ]; then
              echo "=== Recent Container Logs ==="
              docker logs --tail 20 orderease-app 2>&1
            fi
            
            sleep 2
          done
          
          echo "ERROR: Application did not become ready within timeout"
          echo "=== Final Container Logs ==="
          docker logs orderease-app 2>&1
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: OrderEase-Deploy/test/requirements.txt

      - name: Install Test Dependencies
        run: |
          pip install -r OrderEase-Deploy/test/requirements.txt

      - name: Create Test Environment File
        working-directory: OrderEase-Deploy/test
        run: |
          cat > .env << EOF
          API_BASE_URL=http://localhost:8080/api/order-ease/v1
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_USER=root
          DB_PASSWORD=${{ env.MYSQL_ROOT_PASSWORD }}
          DB_NAME=mysql
          EOF

      - name: Run Pytest Tests
        id: pytest
        working-directory: OrderEase-Deploy/test
        env:
          API_BASE_URL: http://localhost:8080/api/order-ease/v1
        run: |
          pytest -v --html=report.html --self-contained-html \
            --junitxml=test-results.xml

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: OrderEase-Deploy/test/report.html

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: OrderEase-Deploy/test/test-results.xml

      - name: Print Application Logs on Failure
        if: failure()
        run: |
          echo "=== OrderEase Application Logs ==="
          docker logs orderease-app || true

      - name: Cleanup Containers
        if: always()
        run: |
          docker stop orderease-app || true
          docker rm orderease-app || true

  # ============================================
  # Job 4: 推送镜像到 Docker Hub (仅在测试通过后)
  # ============================================
  push-to-registry:
    name: Push Image to Docker Hub
    runs-on: ubuntu-latest
    needs: [build-image, integration-test]
    if: |
      always() &&
      needs.integration-test.result == 'success'
    steps:
      - name: Download Docker Image
        uses: actions/download-artifact@v4
        with:
          name: orderease-docker-image
          path: .

      - name: Load Docker Image
        run: |
          docker image load -i orderease-image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image to Docker Hub
        run: |
          TAG="${{ needs.build-image.outputs.image-tag }}"

          # Fallback: if TAG is empty, get it from docker images
          if [ -z "$TAG" ]; then
            echo "Warning: TAG from job output is empty, getting tag from docker images..."
            TAG=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "siyuanh640/orderease" | head -n1)
            echo "Using tag: $TAG"
          fi

          if [ -z "$TAG" ]; then
            echo "Error: TAG is still empty after fallback!"
            docker images
            exit 1
          fi

          echo "Pushing ${TAG}"
          docker push "${TAG}"

      - name: Image Digest
        run: |
          echo "Image pushed with digest: ${{ needs.build-image.outputs.image-digest }}"
